<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Change Tracker — acesso" />
  <title>Change Tracker — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="auth-title">
      <header class="auth-card__head">
        <div class="auth-brand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="auth-brand__icon">
            <line x1="6" y1="3" x2="6" y2="15" />
            <circle cx="18" cy="6" r="3" />
            <circle cx="6" cy="18" r="3" />
            <path d="M18 9a9 9 0 0 1-9 9" />
          </svg>
          <span>Change Tracker</span>
        </div>
        <h1 id="auth-title" class="auth-card__title">Entrar na sua conta</h1>
        <p class="auth-card__sub">Acesse seus itens de mudança.</p>
      </header>

      <a href="/docs" class="auth-api-docs" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <line x1="8" y1="7" x2="16" y2="7" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
        Documentação API
      </a>

      <div class="auth-demo" aria-label="Contas de demonstração">
        <p class="auth-demo__title">Contas de demonstração</p>
        <ul class="auth-demo__list">
          <li><strong>admin@ct.com</strong> / admin123</li>
          <li><strong>maria@ct.com</strong> / demo123</li>
          <li><strong>carlos@ct.com</strong> / demo123</li>
        </ul>
      </div>

      <form id="auth-login-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="auth-email">E-mail</label>
          <input class="auth-input" type="email" id="auth-email" name="email" autocomplete="email" placeholder="voce@exemplo.com" required />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="auth-password">Senha</label>
          <input class="auth-input" type="password" id="auth-password" name="password" autocomplete="current-password" placeholder="Sua senha" required minlength="6" />
        </div>

        <p class="auth-error" id="auth-error" role="alert" aria-live="polite"></p>

        <button type="submit" class="auth-submit" id="auth-submit">Entrar</button>
      </form>

      <p class="auth-switch">
        <span>Ainda não tem conta?</span>
        <a class="auth-switch__btn" href="/register">Solicitar cadastro</a>
      </p>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
