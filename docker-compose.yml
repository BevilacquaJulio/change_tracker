# Change Tracker — deploy VPS (Traefik + MySQL compartilhado)
# Uso: docker compose up -d --build
# Pré-requisitos: redes externas traefik e mysql_shared
#
# Padrão: bigcontext_docker_compose_rules.md

services:
  app:
    build: .
    container_name: change_tracker
    restart: always

    env_file:
      - .env

    networks:
      - mysql_shared
      - traefik

    volumes:
      - evidence_data:/srv/backend/storage/evidence

    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.change_tracker.rule=Host(`${DOMAIN}`)"
      - traefik.http.routers.change_tracker.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.change_tracker.tls=true
      - traefik.http.routers.change_tracker.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.change_tracker.loadbalancer.server.port=8000

networks:
  mysql_shared:
    external: true

  traefik:
    external: true

volumes:
  evidence_data:
